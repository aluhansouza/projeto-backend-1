spring:
  application:
    name: api  # Nome da aplicação

  # Configurações de CORS centralizadas
  web:
    cors:
      originPatterns: "http://localhost:4200,http://localhost:8080"
      allowedMethods: GET,POST,PUT,DELETE,OPTIONS
      allowedHeaders: "*"
      allowCredentials: true

  # Configurações de multipart (uploads)
  servlet:
    multipart:
      enabled: true
      file-size-threshold: 2KB
      max-file-size: 200MB
      max-request-size: 215MB

  # Configurações de datasource e JPA (serão sobrescritas nos perfis)
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    open-in-view: false  # Boa prática: evitar lazy loading fora da transação
    hibernate:
      ddl-auto: none  # Não criar tabelas automaticamente (vai para perfis)

  # Flyway ativado
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true  # Útil se o banco já existir

  # Configurações de Jackson (serialização JSON)
  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: America/Manaus

# Configurações de logging
logging:
  level:
    root: INFO
    org.springframework.security: DEBUG  # Nível mais detalhado para segurança
    api: DEBUG  # Substitua pelo pacote base da sua aplicação

# Configurações customizadas da aplicação
app:
  jwt:
    secret: ${JWT_SECRET:chave-mestre}  # Recomendo usar variável de ambiente
    expiration: 28800000   # 8 horas (em milissegundos)
    refresh-expiration: 604800000  # 7 dias

  file:
    upload-dir: ${UPLOAD_DIR:/projeto/uploads}

  email:
    subject: "Assunto Padrão"
    message: "Mensagem Padrão"

server:
  port: 8080